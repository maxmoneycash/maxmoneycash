name: 3d-contrib

on:
  schedule:
    - cron: "41 5 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: 3d-contrib
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # YEAR requires github-profile-3d-contrib >= v0.8.0; the action always
      # writes the same filenames, so outputs are stashed per year between runs.
      - name: Generate 2023
        uses: yoshi389111/github-profile-3d-contrib@v0.9.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}
          YEAR: "2023"
      - name: Stash 2023
        run: mkdir -p profile-3d-contrib/2023 && mv profile-3d-contrib/profile-*.svg profile-3d-contrib/2023/

      - name: Generate 2024
        uses: yoshi389111/github-profile-3d-contrib@v0.9.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}
          YEAR: "2024"
      - name: Stash 2024
        run: mkdir -p profile-3d-contrib/2024 && mv profile-3d-contrib/profile-*.svg profile-3d-contrib/2024/

      - name: Generate 2025
        uses: yoshi389111/github-profile-3d-contrib@v0.9.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}
          YEAR: "2025"
      - name: Stash 2025
        run: mkdir -p profile-3d-contrib/2025 && mv profile-3d-contrib/profile-*.svg profile-3d-contrib/2025/

      - name: Generate rolling 365 days
        uses: yoshi389111/github-profile-3d-contrib@v0.9.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile-3d-contrib/
          if git diff --cached --quiet; then
            echo "no changes"
            exit 0
          fi
          git commit -m "chore: regenerate 3d contribution profiles"
          for i in 1 2 3 4 5; do
            git push && break
            git pull --rebase
          done
