name: 3d-contrib

on:
  schedule:
    - cron: "41 5 * * *"
  push:
    branches: [main]
    paths: ["conf/3d-theme.json"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: 3d-contrib
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate rolling 365 days (terminal theme)
        uses: yoshi389111/github-profile-3d-contrib@v0.9.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}
          SETTING_JSON: conf/3d-theme.json

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile-3d-contrib/
          if git diff --cached --quiet; then
            echo "no changes"
            exit 0
          fi
          git commit -m "chore: regenerate 3d contribution profile"
          for i in 1 2 3 4 5; do
            git push && break
            git pull --rebase
          done
