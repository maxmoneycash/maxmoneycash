name: readme-cards

on:
  schedule:
    # hourly: re-render + freshness check even when no data push arrives,
    # so a dead collector is noticed within hours, not days
    - cron: "23 * * * *"
  push:
    branches: [main]
    paths: ["data/**", "scripts/**"]
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: readme-cards
  cancel-in-progress: false

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Render cards
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/update_readme.py

      - name: Data freshness guard
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/check_freshness.py

      - name: Rasterize wrapped card to PNG
        run: |
          sudo apt-get update -qq >/dev/null
          sudo apt-get install -y -qq librsvg2-bin fonts-jetbrains-mono >/dev/null
          rsvg-convert -w 1200 assets/wrapped.svg -o assets/wrapped.png

      - name: Cache-bust README image URLs
        env:
          README_CACHE_VER: ${{ github.run_id }}
        run: python scripts/cachebust_readme.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # render_holdings.py rewrites the README holdings block in addition to
          # the assets/ SVGs, so both must be staged.
          git add assets/ README.md
          if git diff --cached --quiet; then
            echo "no changes"
            exit 0
          fi
          git commit -m "chore: render README cards"
          for i in 1 2 3 4 5; do
            git fetch origin main
            # --autostash lets us recover if another push (e.g. token stats)
            # lands between commit and push, mirroring scripts/collect_tokens.sh.
            git rebase -X theirs --autostash origin/main && git push && break
            git rebase --abort 2>/dev/null || true
            sleep 5
          done
